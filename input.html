<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cleco Pii — Input Staff</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#071E1E;color:#E8F4F4;min-height:100vh;padding-bottom:30px}
.hdr{background:#0A2525;border-bottom:1px solid #1A5F5F44;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.card{background:#0F2E2E;border:1px solid #1A5F5F44;border-radius:12px;padding:16px;margin:0 14px 12px}
label{display:block;font-size:11px;color:#7AADAD;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:13px}
label:first-of-type{margin-top:0}
input,select,textarea{width:100%;background:#1A3A3A;border:1px solid #2D5555;border-radius:8px;padding:11px 13px;color:#E8F4F4;font-size:14px;font-family:inherit;outline:none}
input:focus,select:focus{border-color:#C9A84C;box-shadow:0 0 0 2px #C9A84C22}
.btn-gold{width:100%;background:linear-gradient(135deg,#C9A84C,#E8C96D);color:#071E1E;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-outline{width:100%;background:transparent;border:1px solid #2D5555;color:#7AADAD;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:12px 14px 0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{border:none;cursor:pointer;font-weight:700;border-radius:20px;padding:8px 16px;font-size:12px;white-space:nowrap;flex-shrink:0}
.section{display:none}
.section.active{display:block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:none;max-width:90%;text-align:center;box-shadow:0 4px 20px #0008}
/* PIN */
.pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:14px}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;margin-top:6px}
.pin-key{background:#1A3A3A;border:1px solid #2D5555;border-radius:12px;padding:18px;font-size:20px;font-weight:700;cursor:pointer;color:#E8F4F4;text-align:center;user-select:none}
.pin-key:active{background:#2D5555;transform:scale(.95)}
.pin-dots{display:flex;gap:10px;margin:6px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#1A3A3A;border:2px solid #2D5555;transition:all .15s}
.pin-dot.on{background:#C9A84C;border-color:#C9A84C}
.ritem{background:#1A3A3A;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.info{margin-top:10px;padding:10px;background:#1A3A3A;border-radius:8px;font-size:11px;color:#7AADAD;line-height:1.5}
.warn{background:#3A1A1A;color:#FF6B6B44}
</style>
</head>

<!-- PIN SCREEN -->

</div>

      <div>
        <div style="font-size:15px;font-weight:900;color:#C9A84C;line-height:1">Cleco Pii</div>
        <div style="font-size:9px;color:#7AADAD">Input · <span id="namaStaff" style="color:#C9A84C"></span></div>
      </div>

      <button onclick="logout()" style="background:#1A3A3A;border:1px solid #2D5555;color:#7AADAD;padding:6px 10px;border-radius:8px;font-size:11px;cursor:pointer">Keluar</button>

</div>

<div class="toast" id="toast"></div>

<script>
const SB  = "https://rpogymhoemcwrjhollzq.supabase.co/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwb2d5bWhvZW1jd3JqaG9sbHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Mzk3NjAsImV4cCI6MjA5MTExNTc2MH0.PjVc8OMpEZfLV2kils5obeYmILNHH0MpQ5sTs8QmV5w";

const MENUS = {

let pinBuf="", user=null, activeTab="", stokData=[];

// ── PIN ──────────────────────────────────────
function pp(k){
  if(k==="del"){pinBuf=pinBuf.slice(0,-1);}
  else if(k==="ok"){checkPin();return;}
  else if(pinBuf.length<4){pinBuf+=k;}
  if(pinBuf.length===4)setTimeout(checkPin,180);
  updDots();
}
function updDots(){for(let i=0;i<4;i++)document.getElementById("d"+i).className="pin-dot"+(i<pinBuf.length?" on":"");}
function checkPin(){
  if(USERS[pinBuf]){
    user=USERS[pinBuf];
    document.getElementById("namaStaff").textContent=user.nama+" ("+user.jabatan+")";
    document.getElementById("pinScreen").style.display="none";
    document.getElementById("mainApp").style.display="block";
    buildMenus();
  }else{
    document.getElementById("pinErr").textContent="❌ PIN salah, coba lagi";
    pinBuf="";updDots();
    setTimeout(()=>document.getElementById("pinErr").textContent="",2000);
  }
}
function logout(){
  pinBuf="";user=null;
  document.getElementById("mainApp").style.display="none";
  document.getElementById("pinScreen").style.display="flex";
  updDots();
}

// ── BUILD MENUS ──────────────────────────────
function buildMenus(){
  const menus = MENUS[user.role]||[];
  const tabEl = document.getElementById("tabMenu");
  const secEl = document.getElementById("sections");
  tabEl.innerHTML="";secEl.innerHTML="";
  menus.forEach((m,i)=>{
    const btn=document.createElement("button");
    btn.className="tab";btn.id="tb_"+m.id;
    btn.textContent=m.icon+" "+m.label;
    btn.onclick=()=>switchSec(m.id);
    btn.style.background=i===0?"linear-gradient(135deg,#C9A84C,#E8C96D)":"#1A3A3A";
    btn.style.color=i===0?"#071E1E":"#7AADAD";
    tabEl.appendChild(btn);
    const sec=document.createElement("div");
    sec.className="section"+(i===0?" active":"");
    sec.id="sec_"+m.id;
    sec.innerHTML=buildSection(m.id);
    secEl.appendChild(sec);
  });
  activeTab=menus[0]?.id||"";
  setDefaultDates();
  if(menus.find(m=>m.id==="stok_masuk")||menus.find(m=>m.id==="stok_keluar"))loadStok();
}

function switchSec(id){
  const menus=MENUS[user.role]||[];
  menus.forEach(m=>{
    const s=document.getElementById("sec_"+m.id);
    if(s)s.className="section"+(m.id===id?" active":"");
    const b=document.getElementById("tb_"+m.id);
    if(b){b.style.background=m.id===id?"linear-gradient(135deg,#C9A84C,#E8C96D)":"#1A3A3A";b.style.color=m.id===id?"#071E1E":"#7AADAD";}
  });
  activeTab=id;
  if(id==="riwayat")loadRiwayat();
  if(id==="stok_masuk"||id==="stok_keluar")loadStok();
}

// ── HELPERS ──────────────────────────────────
function toast(msg,ok=true){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.background=ok?"#1A4A2A":"#3A1A1A";
  t.style.color=ok?"#4CAF50":"#FF6B6B";
  t.style.border="1px solid "+(ok?"#4CAF50":"#FF6B6B");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3500);
}

function setDefaultDates(){
  const today=new Date().toISOString().slice(0,10);
  document.querySelectorAll("input[type=date]").forEach(el=>{if(!el.value)el.value=today;});
}

async function sbGet(table,params=""){
  const r=await fetch(`${SB}/${table}?${params}`,{headers:{apikey:KEY,Authorization:"Bearer "+KEY}});
  return r.json();
}
async function sbPost(table,data){
  const r=await fetch(`${SB}/${table}`,{method:"POST",headers:H,body:JSON.stringify(data)});
  if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
}
async function sbPatch(table,filter,data){
  const r=await fetch(`${SB}/${table}?${filter}`,{method:"PATCH",headers:H,body:JSON.stringify(data)});
  if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
}
async function nextTrx(){
  const d=await sbGet("jurnal_harian","select=no_trx&order=created_at.desc&limit=1");
  const last=parseInt((d&&d[0]&&d[0].no_trx||"TRX-000").replace("TRX-",""))||0;
  return "TRX-"+(last+1).toString().padStart(3,"0");
}

// ── STOK LOAD ─────────────────────────────────
async function loadStok(){
  try{
    stokData=await sbGet("stok_bahan","select=id,nama_bahan,satuan,sisa_stok,masuk,keluar,kategori&order=nama_bahan");
    filterStok("masuk");filterStok("keluar");
  }catch(e){console.error(e);}
}
function filterStok(type){
  const kat=document.getElementById(type==="masuk"?"smKat":"skKat")?.value||"Bar";
  const arr=stokData.filter(s=>s.kategori===kat);
  const sel=document.getElementById(type==="masuk"?"smNama":"skNama");
  if(sel){
    sel.innerHTML=arr.map(s=>`<option value="${s.id}" data-satuan="${s.satuan}" data-sisa="${s.sisa_stok}">${s.nama_bahan} (sisa: ${s.sisa_stok} ${s.satuan})</option>`).join("");
    if(type==="masuk")updSatuanMasuk();else updSatuanKeluar();
  }
}
function updSatuanMasuk(){const s=document.getElementById("smNama");const o=s?.options[s.selectedIndex];if(document.getElementById("smSat"))document.getElementById("smSat").value=o?.dataset?.satuan||"";}
function updSatuanKeluar(){const s=document.getElementById("skNama");const o=s?.options[s.selectedIndex];if(document.getElementById("skSat"))document.getElementById("skSat").value=o?.dataset?.satuan||"";}

// ── SUBMITS ──────────────────────────────────
async function submitPenjualan(){
  const tgl=document.getElementById("pTgl")?.value;
  const jml=parseInt(document.getElementById("pJml")?.value);
  const trx=document.getElementById("pTrx")?.value;
  const ket=document.getElementById("pKet")?.value;
  const met=document.getElementById("pMet")?.value;
  if(!tgl||!jml||jml<=0){toast("❌ Isi tanggal dan jumlah",false);return;}
  try{
    const no=await nextTrx();
    await sbPost("jurnal_harian",{tanggal:tgl,no_trx:no,keterangan:"Penjualan Harian"+(ket?" — "+ket:"")+(trx?" ("+trx+" trx, "+met+")":""),kategori:"PEMASUKAN",debit:jml,kredit:0,sumber:"staff_"+user.nama.toLowerCase()});
    toast("✅ Penjualan Rp "+jml.toLocaleString("id-ID")+" tersimpan!");
    document.getElementById("pJml").value="";document.getElementById("pTrx").value="";document.getElementById("pKet").value="";
  }catch(e){toast("❌ "+e.message,false);}
}

async function submitPengeluaran(){
  const tgl=document.getElementById("eTgl")?.value;
  const nama=document.getElementById("eNama")?.value;
  const kat=document.getElementById("eKat")?.value;
  const jml=parseInt(document.getElementById("eJml")?.value);
  const ket=document.getElementById("eKet")?.value;
  if(!tgl||!nama||!jml||jml<=0){toast("❌ Isi semua field",false);return;}
  try{
    const no=await nextTrx();
    await sbPost("jurnal_harian",{tanggal:tgl,no_trx:no,keterangan:nama+(ket?" — "+ket:""),kategori:kat,debit:0,kredit:jml,sumber:"staff_"+user.nama.toLowerCase()});
    // Auto-update aktual di tabel opex
    try{
      const opexRow=await sbGet("opex","select=id,aktual&kategori=eq."+kat);
      if(opexRow&&opexRow.length>0){
        await sbPatch("opex","id=eq."+opexRow[0].id,{aktual:(opexRow[0].aktual||0)+jml});
      } else {
        // Buat row baru jika kategori belum ada di opex
        await sbPost("opex",{kategori:kat,anggaran:0,aktual:jml});
      }
    }catch(e2){console.warn("OPEX update skipped:",e2.message);}
    toast("✅ Pengeluaran "+nama+" Rp "+jml.toLocaleString("id-ID")+" tersimpan!");
    document.getElementById("eNama").value="";document.getElementById("eJml").value="";document.getElementById("eKet").value="";
  }catch(e){toast("❌ "+e.message,false);}
}

async function submitStokMasuk(){
  const tgl=document.getElementById("smTgl")?.value;
  const id=document.getElementById("smNama")?.value;
  const jml=parseFloat(document.getElementById("smJml")?.value);
  const sat=document.getElementById("smSat")?.value;
  if(!tgl||!id||!jml||jml<=0){toast("❌ Isi semua field",false);return;}
  const item=stokData.find(s=>s.id===id);
  if(!item){toast("❌ Bahan tidak ditemukan",false);return;}
  try{
    const newSisa=parseFloat(item.sisa_stok||0)+jml;
    const newMasuk=parseFloat(item.masuk||0)+jml;
    await sbPatch("stok_bahan","id=eq."+id,{masuk:newMasuk,sisa_stok:newSisa});
    await sbPost("stok_keluar",{tanggal:tgl,stok_id:id,nama_bahan:item.nama_bahan,kategori:item.kategori,jumlah:-jml,satuan:sat,keterangan:"Stok masuk +"+jml+" "+sat,input_oleh:user.nama});
    toast("✅ Stok "+item.nama_bahan+" +"+jml+" "+sat);
    document.getElementById("smJml").value="";
    stokData=stokData.map(s=>s.id===id?{...s,sisa_stok:newSisa,masuk:newMasuk}:s);
    filterStok("masuk");
  }catch(e){toast("❌ "+e.message,false);}
}

async function submitStokKeluar(){
  const tgl=document.getElementById("skTgl")?.value;
  const id=document.getElementById("skNama")?.value;
  const jml=parseFloat(document.getElementById("skJml")?.value);
  const sat=document.getElementById("skSat")?.value;
  const ket=document.getElementById("skKet")?.value;
  if(!tgl||!id||!jml||jml<=0){toast("❌ Isi semua field",false);return;}
  const item=stokData.find(s=>s.id===id);
  if(!item){toast("❌ Bahan tidak ditemukan",false);return;}
  const newSisa=parseFloat(item.sisa_stok||0)-jml;
  if(newSisa<0){toast("⚠️ Stok tidak cukup! Sisa: "+item.sisa_stok+" "+sat,false);return;}
  try{
    const newKeluar=parseFloat(item.keluar||0)+jml;
    await sbPatch("stok_bahan","id=eq."+id,{keluar:newKeluar,sisa_stok:newSisa});
    await sbPost("stok_keluar",{tanggal:tgl,stok_id:id,nama_bahan:item.nama_bahan,kategori:item.kategori,jumlah:jml,satuan:sat,keterangan:ket||"Pemakaian harian",input_oleh:user.nama});
    toast("✅ Stok "+item.nama_bahan+" -"+jml+" "+sat+" tercatat");
    document.getElementById("skJml").value="";document.getElementById("skKet").value="";
    stokData=stokData.map(s=>s.id===id?{...s,sisa_stok:newSisa,keluar:newKeluar}:s);
    filterStok("keluar");
  }catch(e){toast("❌ "+e.message,false);}
}

async function submitGaji(){
  const tgl=document.getElementById("gTgl")?.value;
  const nama=document.getElementById("gNama")?.value;
  const jenis=document.getElementById("gJenis")?.value;
  const jml=parseInt(document.getElementById("gJml")?.value);
  const ket=document.getElementById("gKet")?.value;
  if(!tgl||!jml||jml<=0){toast("❌ Isi semua field",false);return;}
  const label=jenis==="kasbon"?"Kasbon":jenis==="lembur"?"Uang Lembur":jenis==="makan"?"Uang Makan":"Gaji Tambahan";
  try{
    const no=await nextTrx();
    await sbPost("jurnal_harian",{tanggal:tgl,no_trx:no,keterangan:label+" "+nama+(ket?" — "+ket:""),kategori:"GAJI",debit:0,kredit:jml,sumber:"owner"});
    toast("✅ "+label+" "+nama+" Rp "+jml.toLocaleString("id-ID")+" dicatat!");
    document.getElementById("gJml").value="";document.getElementById("gKet").value="";
  }catch(e){toast("❌ "+e.message,false);}
}

async function submitKonten(){
  const tgl=document.getElementById("knTgl")?.value;
  const judul=document.getElementById("knJudul")?.value;
  if(!tgl||!judul){toast("❌ Isi tanggal dan judul",false);return;}
  try{
    await sbPost("monitoring_konten",{
      tanggal:tgl,
      platform:document.getElementById("knPlatform")?.value,
      jenis:document.getElementById("knJenis")?.value,
      judul:judul,
      caption:document.getElementById("knCaption")?.value,

    });

async function submitPromo(){
  const nama=document.getElementById("prNama")?.value;
  const mulai=document.getElementById("prMulai")?.value;
  if(!nama||!mulai){toast("❌ Isi nama promo dan tanggal mulai",false);return;}
  try{
    await sbPost("promo",{
      nama_promo:nama,
      deskripsi:document.getElementById("prDesc")?.value,
      tgl_mulai:mulai,
      tgl_selesai:document.getElementById("prSelesai")?.value||null,
      diskon:document.getElementById("prDiskon")?.value,
      syarat:document.getElementById("prSyarat")?.value,
      target:document.getElementById("prTarget")?.value,
      status:document.getElementById("prStatus")?.value,
      hasil:document.getElementById("prHasil")?.value,
      input_oleh:user.nama
    });
    toast("✅ Promo '"+nama+"' disimpan!");
    ["prNama","prDesc","prDiskon","prSyarat","prTarget","prHasil"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    loadPromoList();
  }catch(e){toast("❌ "+e.message,false);}
}

async function loadPromoList(){
  const el=document.getElementById("promoListContent");
  if(!el)return;
  try{
    const data=await sbGet("promo","select=nama_promo,tgl_mulai,tgl_selesai,status&order=tgl_mulai.desc&limit=10");
    el.innerHTML=data.map(p=>`<div class="ritem"><div><div style="font-size:12px;font-weight:600">${p.nama_promo}</div><div style="font-size:10px;color:#7AADAD">${p.tgl_mulai||""} ${p.tgl_selesai?"→"+p.tgl_selesai:""}</div></div><span style="font-size:10px;font-weight:700;color:${p.status==="Aktif"?"#4CAF50":p.status==="Selesai"?"#7AADAD":"#FF6B6B"}">${p.status}</span></div>`).join("");
  }catch(e){el.textContent="Gagal memuat";}
}

async function loadRiwayat(){
  const el=document.getElementById("riwayatList");
  if(!el)return;
  el.innerHTML='<div style="text-align:center;color:#7AADAD;font-size:12px;padding:10px">Memuat...</div>';
  const today=new Date().toISOString().slice(0,10);
  const KAT_C={PEMASUKAN:"#C9A84C",BAHAN_BAR:"#2D9D9D",BAHAN_KITCHEN:"#3DAD8D",GAJI:"#E07B54",OPERASIONAL:"#7B5EA7",LISTRIK:"#5496E0",INTERNET:"#36A2E0",KEAMANAN:"#A07060",SEWA:"#E05454",LAIN_LAIN:"#808080"};
  try{
    const data=await sbGet("jurnal_harian","select=*&tanggal=eq."+today+"&order=created_at.desc&limit=30");
    if(!data||!data.length){el.innerHTML='<div style="text-align:center;color:#7AADAD;font-size:12px;padding:20px">Belum ada transaksi hari ini</div>';return;}
    el.innerHTML=data.map(r=>`<div class="ritem"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.keterangan}</div><div style="font-size:10px;color:#7AADAD;margin-top:2px">${r.no_trx||""} · <span style="color:${KAT_C[r.kategori]||"#7AADAD"}">${(r.kategori||"").replace(/_/g," ")}</span></div></div><div style="text-align:right;flex-shrink:0;margin-left:10px">${r.debit>0?`<div style="color:#C9A84C;font-weight:700;font-size:12px">+Rp ${r.debit.toLocaleString("id-ID")}</div>`:""}${r.kredit>0?`<div style="color:#E07B54;font-weight:700;font-size:12px">-Rp ${r.kredit.toLocaleString("id-ID")}</div>`:""}</div></div>`).join("");
  }catch(e){el.innerHTML='<div style="color:#FF6B6B;font-size:12px;padding:10px">❌ '+e.message+'</div>';}
}

// Auto-load promo list when promo section active
const _origSwitchSec = switchSec;
function switchSec(id){
  _origSwitchSec(id);
  if(id==="promo") loadPromoList();
  if(id==="opex") loadOpexEdit();
}

// ── OPEX FUNCTIONS ───────────────────────────
async function loadOpexEdit(){
  const el=document.getElementById("opexEditList");
  if(!el)return;
  try{
    const data=await sbGet("opex","select=id,kategori,anggaran,aktual&order=kategori");
    if(!data||!data.length){el.innerHTML='<div style="color:#7AADAD;font-size:12px;text-align:center;padding:16px">Belum ada data OPEX. Tambah kategori baru di bawah.</div>';return;}
    el.innerHTML=data.map(o=>`
      <div class="ritem" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:12px;font-weight:700;color:#C9A84C">${o.kategori.replace(/_/g," ")}</div>
          <div style="font-size:10px;color:${o.aktual>o.anggaran?"#FF6B6B":"#4CAF50"}">${o.aktual>o.anggaran?"⚠️ Over":"✅ OK"} — Aktual: Rp ${(o.aktual||0).toLocaleString("id-ID")}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="opex_${o.id}" value="${o.anggaran||0}" style="flex:1;background:#0F2E2E;border:1px solid #2D5555;border-radius:8px;padding:9px 12px;color:#E8F4F4;font-size:13px;font-family:inherit;outline:none" placeholder="Anggaran">
          <button onclick="saveOpex('${o.id}')" style="background:#C9A84C33;color:#C9A84C;border:1px solid #C9A84C44;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">💾 Save</button>
        </div>
      </div>`).join("");
  }catch(e){el.innerHTML='<div style="color:#FF6B6B;font-size:12px;padding:10px">❌ '+e.message+'</div>';}
}

async function saveOpex(id){
  const val=parseInt(document.getElementById("opex_"+id)?.value);
  if(!val||val<0){toast("❌ Masukkan angka anggaran yang valid",false);return;}
  try{
    await sbPatch("opex","id=eq."+id,{anggaran:val});
    toast("✅ Anggaran diperbarui: Rp "+val.toLocaleString("id-ID"));
    loadOpexEdit();
  }catch(e){toast("❌ "+e.message,false);}
}

async function submitOpexBaru(){
  const kat=document.getElementById("opexKatBaru")?.value;
  const ang=parseInt(document.getElementById("opexAnggaranBaru")?.value);
  if(!kat||!ang||ang<=0){toast("❌ Isi kategori dan anggaran",false);return;}
  try{
    // Check if category already exists
    const existing=await sbGet("opex","select=id&kategori=eq."+kat);
    if(existing&&existing.length>0){
      await sbPatch("opex","kategori=eq."+kat,{anggaran:ang});
      toast("✅ Anggaran "+kat+" diperbarui");
    } else {
      await sbPost("opex",{kategori:kat,anggaran:ang,aktual:0});
      toast("✅ Kategori OPEX "+kat+" ditambahkan");
    }
    document.getElementById("opexAnggaranBaru").value="";
    loadOpexEdit();
  }catch(e){toast("❌ "+e.message,false);}
}
