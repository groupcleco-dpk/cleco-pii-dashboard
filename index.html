<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleco Pii Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#071E1E;color:#E8F4F4;min-height:100vh}
.card{background:#0F2E2Ecc;border:1px solid #1A5F5F33;border-radius:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .5s ease}
table{width:100%;border-collapse:collapse}
th{background:#1A3A3A;color:#7AADAD;padding:9px 13px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid #1A3A3A22;font-size:13px;vertical-align:middle}
tr:hover td{background:#1A3A3A22}
.badge{padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;display:inline-block}
.btn{border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-weight:600;border-radius:8px;transition:opacity .2s}
.btn:hover{opacity:.85}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2D5555;border-radius:2px}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
    <div style="font-size:40px" class="spin">☕</div>
    <div style="color:#C9A84C;font-size:16px;font-weight:600">Cleco Pii Dashboard</div>
    <div style="color:#7AADAD;font-size:13px">Memuat data...</div>
  </div>
</div>
<script>
const SB_URL = "https://rpogymhoemcwrjhollzq.supabase.co";
const SB_KEY = "sb_publishable_hNCXhJghmB5e5ih5s3L8cQ_78Q2-BKs";
const BEP    = 20833100;

// Init Supabase client (handles new key format automatically)
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

const KAT_COLOR = {
  PEMASUKAN:"#C9A84C",BAHAN_BAR:"#2D9D9D",BAHAN_KITCHEN:"#3DAD8D",
  GAJI:"#E07B54",OPERASIONAL:"#7B5EA7",LISTRIK:"#5496E0",
  KEAMANAN:"#A07060",SEWA:"#E05454",INTERNET:"#54C1E0",LAIN_LAIN:"#808080"
};
const fRp = v => (v===null||v===undefined) ? "—" : "Rp "+Number(v).toLocaleString("id-ID");
const { BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Cell,LineChart,Line } = Recharts;
const { useState, useEffect, useCallback } = React;

function App() {
  const [tab,setTab]     = useState("jurnal");
  const [loading,setL]   = useState(true);
  const [err,setErr]     = useState(null);
  const [ok,setOk]       = useState(false);
  const [upd,setUpd]     = useState("");
  const [jurnal,setJ]    = useState([]);
  const [karyawan,setK]  = useState([]);
  const [gaji,setG]      = useState([]);
  const [stok,setS]      = useState([]);
  const [opex,setO]      = useState([]);

  const load = useCallback(async () => {
    setL(true); setErr(null);
    try {
      const [j,k,g,s,o] = await Promise.all([
        sb.from("jurnal_harian").select("*").order("tanggal",{ascending:false}).limit(300),
        sb.from("karyawan").select("*").order("nama"),
        sb.from("gaji").select("*").order("periode",{ascending:false}),
        sb.from("stok_bahan").select("*").order("kategori").order("nama_bahan"),
        sb.from("opex").select("*").order("kategori"),
      ]);
      if(j.error) throw new Error(j.error.message);
      setJ(j.data||[]); setK(k.data||[]); setG(g.data||[]);
      setS(s.data||[]); setO(o.data||[]);
      setOk(true);
      setUpd(new Date().toLocaleTimeString("id-ID"));
    } catch(e) {
      setErr(e.message); setOk(false);
    } finally { setL(false); }
  },[]);

  useEffect(()=>{ load(); },[load]);

  const totalMasuk  = jurnal.filter(j=>j.kategori==="PEMASUKAN").reduce((s,j)=>s+(j.debit||0),0);
  const totalKeluar = jurnal.filter(j=>j.kategori!=="PEMASUKAN").reduce((s,j)=>s+(j.kredit||0),0);
  const net         = totalMasuk - totalKeluar;
  const bepPct      = Math.min(Math.round(totalMasuk/BEP*100),100);
  const aktif       = karyawan.filter(k=>k.status==="aktif").length;

  const katData = Object.entries(
    jurnal.reduce((acc,j)=>{
      acc[j.kategori]=(acc[j.kategori]||0)+(j.kategori==="PEMASUKAN"?(j.debit||0):(j.kredit||0));
      return acc;
    },{})
  ).map(([n,v])=>({name:n.replace(/_/g," "),nilai:v,key:n}))
   .filter(d=>d.nilai>0).sort((a,b)=>b.nilai-a.nilai);

  const daily = Object.entries(
    jurnal.filter(j=>j.kategori==="PEMASUKAN")
      .reduce((acc,j)=>{acc[j.tanggal]=(acc[j.tanggal]||0)+(j.debit||0);return acc;},{})
  ).map(([t,v])=>({tgl:t.slice(5),nilai:v})).sort((a,b)=>a.tgl.localeCompare(b.tgl));

  const gajiRows = karyawan.map(k=>({...k,...(gaji.find(g=>g.karyawan_id===k.id)||{})}));
  const stokBar  = stok.filter(s=>s.kategori==="Bar");
  const stokKit  = stok.filter(s=>s.kategori==="Kitchen");

  const e = React.createElement;

  if(loading) return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}},
    e("div",{style:{fontSize:40},className:"spin"},"☕"),
    e("div",{style:{color:"#C9A84C",fontSize:16,fontWeight:600}},"Cleco Pii Dashboard"),
    e("div",{style:{color:"#7AADAD",fontSize:13}},"Menghubungkan ke Supabase...")
  );

  return e("div",{style:{minHeight:"100vh",background:"#071E1E",color:"#E8F4F4"}},

    // HEADER
    e("div",{style:{background:"#0A2525EE",borderBottom:"1px solid #1A5F5F33",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}},
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        e("div",{style:{background:"linear-gradient(135deg,#C9A84C,#E8C96D)",padding:"8px 10px",borderRadius:10,fontSize:18}},"☕"),
        e("div",null,
          e("div",{style:{fontSize:20,fontWeight:900,color:"#C9A84C"}},"Cleco Pii"),
          e("div",{style:{fontSize:9,color:"#7AADAD",letterSpacing:".08em"}},"LIVE FINANCIAL DASHBOARD")
        )
      ),
      e("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        upd && e("span",{style:{fontSize:10,color:"#4A7A7A"}},"Update: "+upd),
        ok  && e("span",{style:{color:"#4CAF50",fontSize:11,fontWeight:700}},"● LIVE"),
        !ok && e("span",{style:{color:"#FF6B6B",fontSize:11}},"● Error"),
        e("button",{className:"btn",onClick:load,style:{background:"#1A3A3A",color:"#C9A84C",padding:"7px 14px",fontSize:12,border:"1px solid #C9A84C33"}},"↻ Refresh")
      )
    ),

    err && e("div",{style:{background:"#3A1A1A",padding:"10px 20px",color:"#FF6B6B",fontSize:12,borderBottom:"1px solid #FF6B6B33"}},"⚠️ "+err),

    e("div",{className:"fade",style:{padding:"16px 20px",maxWidth:1200,margin:"0 auto"}},

      // CARDS
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}},
        ...[
          {l:"Total Pemasukan",  v:fRp(totalMasuk),  c:"#C9A84C",i:"📈",s:jurnal.filter(j=>j.kategori==="PEMASUKAN").length+" transaksi"},
          {l:"Total Pengeluaran",v:fRp(totalKeluar), c:"#E07B54",i:"📉",s:jurnal.filter(j=>j.kategori!=="PEMASUKAN").length+" transaksi"},
          {l:"Net Cash Flow",    v:fRp(net),          c:net>=0?"#4CAF50":"#FF6B6B",i:"💰",s:net>=0?"Surplus ✅":"Defisit ⚠️"},
          {l:"Karyawan Aktif",   v:aktif+" orang",    c:"#2D9DAD",i:"👥",s:"Staff aktif"},
        ].map((c,i)=>e("div",{key:i,className:"card",style:{padding:14}},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            e("div",null,
              e("div",{style:{fontSize:9,color:"#7AADAD",textTransform:"uppercase",letterSpacing:".06em",marginBottom:5}},c.l),
              e("div",{style:{fontSize:16,fontWeight:700,color:c.c}},c.v),
              e("div",{style:{fontSize:10,color:"#4A7A7A",marginTop:3}},c.s)
            ),
            e("div",{style:{fontSize:24}},c.i)
          )
        ))
      ),

      // BEP
      e("div",{className:"card",style:{padding:"13px 18px",marginBottom:14}},
        e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:5}},
          e("span",{style:{fontSize:11,color:"#7AADAD"}}, "Progress BEP → ", e("b",{style:{color:"#C9A84C"}},fRp(BEP))),
          e("span",{style:{fontSize:18,fontWeight:900,color:bepPct>=100?"#4CAF50":"#C9A84C"}},bepPct+"%")
        ),
        e("div",{style:{height:8,background:"#1A3A3A",borderRadius:4,overflow:"hidden"}},
          e("div",{style:{height:"100%",width:bepPct+"%",background:"linear-gradient(90deg,#2D7D7D,#C9A84C)",borderRadius:4,transition:"width 1s ease"}})
        ),
        e("div",{style:{display:"flex",justifyContent:"space-between",marginTop:5}},
          e("span",{style:{fontSize:10,color:"#4A7A7A"}},"Tercapai: "+fRp(totalMasuk)),
          e("span",{style:{fontSize:10,color:"#E07B54"}},"Sisa: "+fRp(Math.max(0,BEP-totalMasuk)))
        )
      ),

      // CHARTS
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}},
        e("div",{className:"card",style:{padding:"15px 18px"}},
          e("div",{style:{color:"#C9A84C",fontWeight:700,fontSize:14,marginBottom:12}},"📊 Breakdown Kategori"),
          e(ResponsiveContainer,{width:"100%",height:170},
            e(BarChart,{data:katData,barSize:20},
              e(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1A3A3A55"}),
              e(XAxis,{dataKey:"name",tick:{fill:"#7AADAD",fontSize:8},interval:0,angle:-25,textAnchor:"end",height:45}),
              e(YAxis,{tickFormatter:v=>(v/1000000).toFixed(1)+"M",tick:{fill:"#7AADAD",fontSize:8}}),
              e(Tooltip,{formatter:v=>fRp(v),contentStyle:{background:"#0F2E2E",border:"1px solid #1A5F5F55",borderRadius:8,color:"#E8F4F4",fontSize:11}}),
              e(Bar,{dataKey:"nilai",radius:[4,4,0,0]},
                katData.map((d,i)=>e(Cell,{key:i,fill:KAT_COLOR[d.key]||"#2D7D7D"}))
              )
            )
          )
        ),
        e("div",{className:"card",style:{padding:"15px 18px"}},
          e("div",{style:{color:"#C9A84C",fontWeight:700,fontSize:14,marginBottom:12}},"📈 Tren Penjualan Harian"),
          e(ResponsiveContainer,{width:"100%",height:170},
            e(LineChart,{data:daily},
              e(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1A3A3A55"}),
              e(XAxis,{dataKey:"tgl",tick:{fill:"#7AADAD",fontSize:8}}),
              e(YAxis,{tickFormatter:v=>(v/1000).toFixed(0)+"K",tick:{fill:"#7AADAD",fontSize:8}}),
              e(Tooltip,{formatter:v=>fRp(v),contentStyle:{background:"#0F2E2E",border:"1px solid #1A5F5F55",borderRadius:8,color:"#E8F4F4",fontSize:11}}),
              e(Line,{type:"monotone",dataKey:"nilai",stroke:"#C9A84C",strokeWidth:2.5,dot:{fill:"#C9A84C",r:3}})
            )
          )
        )
      ),

      // OPEX CARDS
      opex.length>0 && e("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}},
        ...opex.map((o,i)=>{
          const pct=o.anggaran>0?Math.round(o.aktual/o.anggaran*100):0;
          const over=o.aktual>o.anggaran;
          return e("div",{key:i,className:"card",style:{padding:"10px 13px"}},
            e("div",{style:{fontSize:9,color:"#7AADAD",marginBottom:4,textTransform:"uppercase",letterSpacing:".04em"}},o.kategori),
            e("div",{style:{fontSize:13,fontWeight:700,color:over?"#FF6B6B":"#E8F4F4"}},fRp(o.aktual)),
            e("div",{style:{fontSize:9,color:"#4A7A7A",marginTop:2}},"dari "+fRp(o.anggaran)),
            e("div",{style:{height:3,background:"#1A3A3A",borderRadius:2,marginTop:6,overflow:"hidden"}},
              e("div",{style:{height:"100%",width:Math.min(pct,100)+"%",background:over?"#FF6B6B":"#C9A84C",borderRadius:2}})
            ),
            e("div",{style:{fontSize:9,color:over?"#FF6B6B":"#4CAF50",marginTop:3,fontWeight:700}},over?"⚠️ Over "+pct+"%":"✅ OK "+pct+"%")
          );
        })
      ),

      // TABS
      e("div",{style:{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}},
        ...[["jurnal","📒 Jurnal"],["karyawan","👥 Karyawan"],["stok_bar","☕ Stok Bar"],["stok_kit","🍳 Stok Kitchen"]]
          .map(([k,l])=>e("button",{key:k,className:"btn",onClick:()=>setTab(k),
            style:tab===k
              ?{background:"linear-gradient(135deg,#C9A84C,#E8C96D)",color:"#071E1E",padding:"7px 16px",fontSize:12}
              :{background:"#1A3A3A",color:"#7AADAD",padding:"7px 16px",fontSize:12,border:"1px solid #2D5555"}
          },l))
      ),

      // JURNAL TABLE
      tab==="jurnal" && e("div",{className:"card",style:{overflow:"hidden"}},
        e("div",{style:{padding:"12px 16px",borderBottom:"1px solid #1A3A3A",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("b",{style:{color:"#C9A84C"}},"📒 Jurnal Harian"),
          e("span",{style:{color:"#7AADAD",fontSize:11}},jurnal.length+" transaksi")
        ),
        e("div",{style:{overflowX:"auto",maxHeight:400,overflowY:"auto"}},
          e("table",null,
            e("thead",null,e("tr",null,...["Tanggal","No TRX","Keterangan","Kategori","Debit","Kredit"].map((h,i)=>e("th",{key:i,style:i>3?{textAlign:"right"}:{}},h)))),
            e("tbody",null,...jurnal.map((r,i)=>e("tr",{key:i},
              e("td",{style:{color:"#7AADAD",fontSize:12,whiteSpace:"nowrap"}},r.tanggal),
              e("td",{style:{color:"#4A7A7A",fontSize:11}},r.no_trx),
              e("td",{style:{fontWeight:500}},r.keterangan),
              e("td",null,e("span",{className:"badge",style:{background:(KAT_COLOR[r.kategori]||"#2D7D7D")+"22",color:KAT_COLOR[r.kategori]||"#2D7D7D"}},(r.kategori||"").replace(/_/g," "))),
              e("td",{style:{textAlign:"right",color:"#C9A84C",fontWeight:r.debit>0?700:400}},r.debit>0?fRp(r.debit):"—"),
              e("td",{style:{textAlign:"right",color:"#E07B54",fontWeight:r.kredit>0?700:400}},r.kredit>0?fRp(r.kredit):"—")
            )))
          )
        )
      ),

      // KARYAWAN TABLE
      tab==="karyawan" && e("div",{className:"card",style:{overflow:"hidden"}},
        e("div",{style:{padding:"12px 16px",borderBottom:"1px solid #1A3A3A"}},e("b",{style:{color:"#C9A84C"}},"👥 Karyawan & Gaji")),
        e("div",{style:{overflowX:"auto"}},
          e("table",null,
            e("thead",null,e("tr",null,...["Nama","Jabatan","Status","Gaji Pokok","Uang Makan","Total","Kasbon","Net Gaji"].map((h,i)=>e("th",{key:i,style:i>2?{textAlign:"right"}:{}},h)))),
            e("tbody",null,
              ...gajiRows.map((r,i)=>e("tr",{key:i},
                e("td",{style:{fontWeight:700}},r.nama),
                e("td",{style:{color:"#7AADAD"}},r.jabatan),
                e("td",null,e("span",{className:"badge",style:r.status==="aktif"?{background:"#1A4A2A",color:"#4CAF50"}:{background:"#3A1A1A",color:"#FF6B6B"}},r.status)),
                e("td",{style:{textAlign:"right"}},fRp(r.gaji_pokok)),
                e("td",{style:{textAlign:"right"}},fRp(r.uang_makan)),
                e("td",{style:{textAlign:"right"}},fRp(r.total_gaji)),
                e("td",{style:{textAlign:"right",color:"#E07B54"}},r.kasbon>0?fRp(r.kasbon):"—"),
                e("td",{style:{textAlign:"right",color:"#C9A84C",fontWeight:700}},fRp(r.net_gaji))
              )),
              e("tr",{style:{background:"#1A3A3A"}},
                e("td",{colSpan:5,style:{fontWeight:700,color:"#C9A84C"}},"TOTAL"),
                e("td",{style:{textAlign:"right",fontWeight:700,color:"#C9A84C"}},fRp(gajiRows.reduce((s,r)=>s+(r.total_gaji||0),0))),
                e("td",{style:{textAlign:"right",color:"#E07B54",fontWeight:700}},fRp(gajiRows.reduce((s,r)=>s+(r.kasbon||0),0))),
                e("td",{style:{textAlign:"right",color:"#C9A84C",fontWeight:700}},fRp(gajiRows.reduce((s,r)=>s+(r.net_gaji||0),0)))
              )
            )
          )
        )
      ),

      // STOK TABLE
      (tab==="stok_bar"||tab==="stok_kit") && e("div",{className:"card",style:{overflow:"hidden"}},
        e("div",{style:{padding:"12px 16px",borderBottom:"1px solid #1A3A3A",display:"flex",justifyContent:"space-between"}},
          e("b",{style:{color:"#C9A84C"}},tab==="stok_bar"?"☕ Stok Bar":"🍳 Stok Kitchen"),
          e("span",{style:{color:"#7AADAD",fontSize:11}},(tab==="stok_bar"?stokBar:stokKit).length+" item")
        ),
        e("div",{style:{overflowX:"auto",maxHeight:400,overflowY:"auto"}},
          e("table",null,
            e("thead",null,e("tr",null,...["Nama Bahan","Satuan","Stok Awal","Masuk","Keluar","Sisa","Status"].map((h,i)=>e("th",{key:i,style:i>1&&i<6?{textAlign:"right"}:{}},h)))),
            e("tbody",null,...(tab==="stok_bar"?stokBar:stokKit).map((r,i)=>{
              const low=r.sisa_stok<=0;
              return e("tr",{key:i},
                e("td",{style:{fontWeight:500}},r.nama_bahan),
                e("td",{style:{color:"#7AADAD"}},r.satuan),
                e("td",{style:{textAlign:"right"}},r.stok_awal),
                e("td",{style:{textAlign:"right",color:"#4CAF50"}},r.masuk>0?"+"+r.masuk:"—"),
                e("td",{style:{textAlign:"right",color:"#E07B54"}},r.keluar>0?"-"+r.keluar:"—"),
                e("td",{style:{textAlign:"right",fontWeight:700,color:low?"#FF6B6B":"#C9A84C"}},r.sisa_stok),
                e("td",null,e("span",{className:"badge",style:low?{background:"#3A1A1A",color:"#FF6B6B"}:{background:"#1A4A2A",color:"#4CAF50"}},low?"⚠️ Habis":"✅ Ada"))
              );
            }))
          )
        )
      ),

      // FOOTER
      e("div",{style:{textAlign:"center",marginTop:20,paddingTop:14,borderTop:"1px solid #1A3A3A",fontSize:10,color:"#4A7A7A"}},
        "Cleco Pii Coffee & Eatery · JL Nusantara Raya No 214 Beji, Depok · @cleco.pii",
        e("div",{style:{marginTop:4,color:"#2D5555",fontSize:9}},"Supabase Live · "+jurnal.length+" jurnal · "+stok.length+" stok items")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
